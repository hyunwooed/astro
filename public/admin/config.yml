# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json

backend:
  name: github
  repo: hyunwooed/astro
  auth_methods: [token]

# Default media storage paths
media_folder: /public/media
public_folder: /media

# Media provider features
media_libraries:
  default:
    config:
      max_file_size: 1024000 # default: Infinity
      slugify_filename: true # default: false
      transformations: # See the documentation for details
  cloudflare_r2:
    access_key_id: f8e652d523054d81d3824bb1ae3a51f5
    bucket: bucket
    account_id: dc14cfb137afeafec178849ea6ab3bed
    public_url: https://media.hyunwoo.org
    prefix: cms-uploads/ # Optional
    jurisdiction: default # Optional; 'default' | 'eu' | 'fedramp'
    
collections:
  - name: pages
    label: Pages
    files:
      - name: about
        label: About
        file: content/pages/about.md
        fields:
          - { name: title, label: Title }
          - { name: body, label: Body, widget: richtext }
  - name: posts
    label: Posts
    label_singular: Post
    folder: /content/posts
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime, type: date }
      - { label: Body, name: body, widget: richtext }
